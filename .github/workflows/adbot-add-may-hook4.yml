name: adbot · Add MAY Hook 4 ad (manual)

# Adds ONE new video ad (Hook 4：想要加入州队？) PAUSED into the two existing creative-test
# ad sets (Parents + Family → each becomes 1-1-3). Downloads the video from Drive, uploads to
# Meta, builds a single text/headline creative, and creates one ad per ad set. Idempotent —
# reruns reuse cached video/creative/ad ids from state/entities_may_hook4.json.

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install .
      - name: Add MAY Hook 4 ad (PAUSED)
        env:
          ADBOT_ROOT: ${{ github.workspace }}
          ADBOT_CONFIG: ${{ github.workspace }}/config/config.yaml
          GOOGLE_SERVICE_ACCOUNT_JSON_B64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_B64 }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          META_SYSTEM_USER_TOKEN: ${{ secrets.META_SYSTEM_USER_TOKEN }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
        run: python scripts/add_may_hook4.py
      - name: Persist created entity IDs back to the branch
        run: |
          git config user.name "adbot"
          git config user.email "noreply@anthropic.com"
          git add state/ || true
          git commit -m "build: persist MAY Hook 4 entity ids [skip ci]" || echo "no state change"
          git push || echo "push skipped"
