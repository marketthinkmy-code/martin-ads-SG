name: adbot · Apply approved campaign changes (manual)

# LIVE writes approved by the operator on 2026-07-24: raise budgets (Scale-CBO 2, Parents
# 1-1-3, Family 1-1-3 RM250) and pause two campaigns (Scale-CBO original, broken Family
# RM100 dup). Matches each target by name + exact current budget + ACTIVE status; skips
# anything ambiguous. One-shot manual dispatch.

on:
  workflow_dispatch: {}

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install .
      - name: Apply approved campaign changes
        env:
          ADBOT_ROOT: ${{ github.workspace }}
          ADBOT_CONFIG: ${{ github.workspace }}/config/config.yaml
          META_SYSTEM_USER_TOKEN: ${{ secrets.META_SYSTEM_USER_TOKEN }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
        run: python scripts/apply_budget_changes.py
