name: adbot · Scale analysis (manual)

# Manual, read-only: for every ACTIVE registration-optimized ad, joins Meta insights
# (7d/14d/30d/60d/lifetime spend + registrations + CPL) to the Paid Student List
# (real paid sales + CPA), classifies each into a scale tier, and rolls the picture up
# to the CBO campaign level (current daily budget vs. what the numbers justify).
# No writes, no pauses.

on:
  workflow_dispatch: {}

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install .
      - name: Scale analysis
        env:
          ADBOT_ROOT: ${{ github.workspace }}
          ADBOT_CONFIG: ${{ github.workspace }}/config/config.yaml
          GOOGLE_SERVICE_ACCOUNT_JSON_B64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_B64 }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          META_SYSTEM_USER_TOKEN: ${{ secrets.META_SYSTEM_USER_TOKEN }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
        run: python scripts/scale_analysis.py
