name: adbot · Remarketing build (manual)

# Builds the SG Remarketing skeleton (1 CBO campaign + 3 warm-audience ad sets,
# PAUSED, 0 ads) with all SG compliance fields. Idempotent — reruns reuse the
# ids in state/entities_remarketing.json so it never duplicates.
# Custom audiences (Video Viewers 25% 30d, LP Visitors 30d, Registered No-Shows)
# are attached to their matching ad sets in Ads Manager after build.

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install .
      - name: Build Remarketing skeleton (PAUSED)
        env:
          ADBOT_ROOT: ${{ github.workspace }}
          ADBOT_CONFIG: ${{ github.workspace }}/config/remarketing.yaml
          GOOGLE_SERVICE_ACCOUNT_JSON_B64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_B64 }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          META_SYSTEM_USER_TOKEN: ${{ secrets.META_SYSTEM_USER_TOKEN }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
        run: python scripts/build_remarketing.py
      - name: Persist created entity IDs back to the branch
        run: |
          git config user.name "adbot"
          git config user.email "noreply@anthropic.com"
          git add state/ || true
          git commit -m "build: persist Remarketing entity ids [skip ci]" || echo "no state change"
          git push || echo "push skipped"
