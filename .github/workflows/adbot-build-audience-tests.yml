name: adbot · build audience tests (5× 1-1-3, PAUSED)

# One-off: builds 5 audience-test campaigns (1 CBO campaign + 1 ad set + 3 ads each),
# ALL PAUSED. Each ad set clones a top-converting audience's real Detailed Targeting
# (interest/behavior IDs) from the account portfolio, forced to SG geo + SG exclusions.
# CBO RM100/day · delivery scheduled 2026-07-16 00:00 +08:00 · captions read from Notion.

on:
  workflow_dispatch: {}

concurrency:
  group: adbot-build-audience-tests
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # persist created entity ids + media cache back to the branch
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install .
      - name: Build 5 audience-test campaigns (PAUSED)
        env:
          ADBOT_ROOT: ${{ github.workspace }}
          ADBOT_CONFIG: ${{ github.workspace }}/config/config.yaml
          META_SYSTEM_USER_TOKEN: ${{ secrets.META_SYSTEM_USER_TOKEN }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          GOOGLE_SERVICE_ACCOUNT_JSON_B64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_B64 }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: python scripts/build_audience_tests.py
      - name: Persist created entity IDs back to the branch
        run: |
          git config user.name "adbot"
          git config user.email "noreply@anthropic.com"
          git add state/ || true
          git commit -m "build audience tests: persist entity ids [skip ci]" || echo "no state change"
          git push || echo "push skipped"
