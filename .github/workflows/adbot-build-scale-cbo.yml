name: adbot · Scale-CBO build (manual)

# Builds the SG Scale-CBO skeleton (1 campaign + 1 ad set, PAUSED, 0 ads) with
# all SG compliance fields. Idempotent — reruns reuse the campaign_id + adset_id
# in state/entities_scale_cbo.json so it never duplicates. Ads (6 winners + MANUS
# single image) are added manually in Ads Manager afterwards.

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # persist state/ (entity ids) back to the branch
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install .
      - name: Build Scale-CBO skeleton (PAUSED)
        env:
          ADBOT_ROOT: ${{ github.workspace }}
          ADBOT_CONFIG: ${{ github.workspace }}/config/scale-cbo.yaml
          GOOGLE_SERVICE_ACCOUNT_JSON_B64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_B64 }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          META_SYSTEM_USER_TOKEN: ${{ secrets.META_SYSTEM_USER_TOKEN }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
        run: python scripts/build_scale_cbo.py
      - name: Persist created entity IDs back to the branch
        run: |
          git config user.name "adbot"
          git config user.email "noreply@anthropic.com"
          git add state/ || true
          git commit -m "build: persist Scale-CBO entity ids [skip ci]" || echo "no state change"
          git push || echo "push skipped"
