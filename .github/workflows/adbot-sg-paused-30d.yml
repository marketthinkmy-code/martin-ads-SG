name: adbot · SG paused 30d worth-scaling (manual)

# Manual, read-only: which SG-region PAUSED Meta ads still had paid sales in the
# last 30 days (SG filter = phone starts with 65). Auto-detects the sheet's
# date column (Chinese header 報名日期), auto-falls-back to 90d / lifetime if 30d
# is empty. Prints per-variant ad_id + status + spend + ROAS + parent status so
# the operator can pick which specific paused ads to un-pause. No writes.

on:
  workflow_dispatch: {}

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install .
      - name: SG paused 30d worth-scaling
        env:
          ADBOT_ROOT: ${{ github.workspace }}
          ADBOT_CONFIG: ${{ github.workspace }}/config/config.yaml
          GOOGLE_SERVICE_ACCOUNT_JSON_B64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_B64 }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          META_SYSTEM_USER_TOKEN: ${{ secrets.META_SYSTEM_USER_TOKEN }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
        run: python scripts/sg_paused_30d.py
