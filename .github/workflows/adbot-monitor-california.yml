name: adbot · CPL+CPA monitor 加州/US (hourly)

# SEPARATE monitor for the 加州/US account (act_1629566827721449), fully isolated
# from the SG monitor (adbot-monitor.yml) — different config, different account,
# different sheet tab. ARMED: on schedule it pauses any ACTIVE US ad whose
# cost-per-Complete-Registration exceeds RM85 (US ceiling; higher than SG's RM65
# because US CPMs run higher), folded with the real-sales CPA gate. Only pauses
# over-threshold ACTIVE ads, never un-pauses. Registration-optimized ads only.
#
# Manual dispatch with dry_run=true = alert-only (evaluate + log, write nothing).

on:
  schedule:
    - cron: "12,32,52 * * * *"   # staggered off SG's 7,27,47 so the two monitors don't hit the API together
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — evaluate + log what would pause, write nothing"
        type: boolean
        default: false

concurrency:
  group: adbot-monitor-california
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install .
      - name: Run CPL+CPA monitor (加州/US)
        env:
          ADBOT_ROOT: ${{ github.workspace }}
          ADBOT_CONFIG: ${{ github.workspace }}/config/config.california.yaml
          META_SYSTEM_USER_TOKEN: ${{ secrets.META_SYSTEM_USER_TOKEN }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          GOOGLE_SERVICE_ACCOUNT_JSON_B64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_B64 }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python -m adbot --config "${{ github.workspace }}/config/config.california.yaml" monitor ${{ inputs.dry_run && '--dry-run' || '' }}
