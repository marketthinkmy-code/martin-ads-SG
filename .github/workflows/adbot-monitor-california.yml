name: adbot · CPL+CPA monitor 加州/US (ALERT-ONLY)

# SEPARATE monitor for the 加州/US account (act_1629566827721449), fully isolated
# from the SG monitor (adbot-monitor.yml) — different config, different account,
# different sheet tab. Runs ALERT-ONLY: evaluates every active US ad and LOGS
# "WOULD PAUSE …", but writes NOTHING to Meta and no state (monitor's --dry-run
# guards both the pause and the pause-log). Read the Actions logs to see verdicts.
#
# To ARM it later (actually pause): remove `--dry-run` from the run step (or flip
# the dispatch input), once the US CPL/CPA thresholds in config.california.yaml
# have been confirmed against real US-market numbers.

on:
  schedule:
    - cron: "12,32,52 * * * *"   # staggered off SG's 7,27,47 so the two monitors don't hit the API together
  workflow_dispatch:
    inputs:
      arm:
        description: "ARM it — actually pause over-threshold ads (default false = alert-only)"
        type: boolean
        default: false

concurrency:
  group: adbot-monitor-california
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install .
      - name: Run CPL+CPA monitor (加州/US)
        env:
          ADBOT_ROOT: ${{ github.workspace }}
          ADBOT_CONFIG: ${{ github.workspace }}/config/config.california.yaml
          META_SYSTEM_USER_TOKEN: ${{ secrets.META_SYSTEM_USER_TOKEN }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          GOOGLE_SERVICE_ACCOUNT_JSON_B64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_B64 }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        # default = alert-only (--dry-run). Manual dispatch with arm=true removes it.
        run: python -m adbot --config "${{ github.workspace }}/config/config.california.yaml" monitor ${{ inputs.arm == true && '' || '--dry-run' }}
