# ─────────────────────────────────────────────────────────────────────────────
# adbot — batch config: "单图" angle (12 繁体单图, Notion 简体 caption) — martin-ads-SG
# Same account/page/pixel/targeting as config.yaml; only the creatives folder, budget,
# and per-batch identity (label + state_key) differ so this campaign is fully separate
# from the main 1-1-10 and the grades batch. SG-specific fields (advertiser verification
# + regulated category) MUST mirror config.yaml or SG ad-set creation is rejected.
# ─────────────────────────────────────────────────────────────────────────────

meta:
  ad_account_id: "act_1024930575770087"    # Martin SG ad account (SG-specific)
  page_id: "341825319024143"               # shared with MY
  instagram_user_id: null                  # IG via the Page's linked IG (same as main)
  pixel_id: "1189593242351293"             # shared with MY (must be shared to the SG ad account)

  objective: "OUTCOME_SALES"
  optimization_goal: "OFFSITE_CONVERSIONS"
  conversion_event: "COMPLETE_REGISTRATION"
  # Customer lifecycle strategy "Get conversions from all audiences" = the OUTCOME_SALES default
  # (no new-customer focus is set), so this batch already complies with the operator standard.
  special_ad_categories: []
  regional_regulated_categories: ["SINGAPORE_UNIVERSAL"]   # SG: required on campaign AND ad set

  lead_destination:
    type: "WEBSITE"
    link_url: "https://as.dr-martin.com.tw/kids-growth-formula-landing"
  conversion_domain: "https://as.dr-martin.com.tw/"
  call_to_action: "LEARN_MORE"
  url_tags: "utm_source={{adset.name}}&utm_medium={{placement}}&utm_campaign={{campaign.name}}&utm_content={{ad.name}}"

  budget:
    level: "CAMPAIGN"
    daily_amount_myr: 100                  # operator-chosen for this batch (between grades 50 and main 250)
    currency: "MYR"
    adset_min_spend_myr: 50

  # SG ad-transparency: verified advertiser + payer (identity IDs) — required on the ad set, else
  # Meta blocks delivery with "Advertiser is missing". Same verified identity as the main campaign.
  regional_regulation_identities:
    singapore_universal_beneficiary: "1480351249808277"
    singapore_universal_payer: "1480351249808277"

  targeting:                               # identical broad setup to the main config
    countries: ["SG"]
    age_min: 25                            # Meta API rejects age_min > 25 when advantage_audience=1; bump to operator-standard 35 in Ads Manager UI after build (UI accepts it as a soft suggestion)
    age_max: 65
    advantage_audience: 1
    locales: [1004]
    excluded_custom_audiences:             # SG-native (act_1024930575770087) — no cross-account sharing needed
      - "120226672882380093"               # "15 days complete registration" (SG website/pixel CA)
      - "120246547080720093"               # "马丁 1997 Paid Student" (SG customer list)

  build:
    creatives_per_adset: 12                # 12 单图 (two "简体.png" files are intentionally excluded by the operator)
    activate_after_build: false            # build PAUSED; activate after review
    label: "单图"                           # campaign name -> "MARTIN-SG | 单图"
    state_key: "entities_singleimg"        # separate state file — never touches the main or grades batch

naming:
  prefix: "MARTIN-SG"                      # SG-specific
  weekly_off_label: "ADBOT_WEEKLY_OFF"

drive:
  # Operator's new 单图 folder (12 single images, after renaming to match Notion Content IDs).
  # Two files named "简体.png" are present but slugify to the same id and the operator does NOT
  # want them in this batch — move them out of the folder (or rename) before running this build.
  creatives_folder_id: "13-gzRl7I2ap5dlN48yJsvsWwUZjw-Tyl"
  carousel_subfolder_marker: "carousel"     # no carousel subfolder here, kept for compatibility
  script_sidecar_ext: ".txt"

google_docs:
  caption_log_doc_id: ""
  idea_backlog_doc_id: ""

notion:                                    # captions read from Notion by Content ID; copy is Martin MY (简体), reused for SG
  enabled: true
  database_id: "4bb82b42449682c294e881448aa21435"
  brand: "Martin MY"
  default_status: "In Review"
  default_type: "Caption"
  captions_source: true                    # build READS caption+headline FROM Notion (Content ID must match the Drive filename slug)
  require_status: ""

kpi:
  cpl_threshold_myr: 55.00
  cpl_min_spend_myr: 100.00
  cpl_lookback: "week_thu"
  pause_zero_lead_after_spend: true
  cpl_hold: []

cpa:
  enabled: true
  spreadsheet_id: "1DsKtcDpsWp3Njfah6Fw3PBizhGiy017ULw5qKeV-RSA"
  sales_tab: "Paid Student List (RM1997)"
  price_myr: 2591.00
  target_myr: 740.00
  healthy_max_myr: 860.00
  max_acceptable_myr: 1040.00
  hard_stop_myr: 1300.00
  conversion_days: 14
  min_spend_myr: 1000.00

schedule:
  timezone: "Asia/Singapore"
  weekly_off: { day: "WED", time: "15:00" }
  weekly_on:  { day: "THU", time: "00:00" }
  monitor_interval_hours: 1
