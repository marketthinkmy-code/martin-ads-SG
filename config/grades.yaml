# ─────────────────────────────────────────────────────────────────────────────
# adbot — batch config: "成绩单" angle (social-proof / real growth results) — martin-ads-SG
# Same account/page/pixel/targeting as config.yaml; only the creatives folder, budget,
# and per-batch identity (label + state_key) differ so this campaign is fully separate
# from the main 1-1-10 (which keeps label "1-1-10" / state_key "entities").
# SG-specific values mirror config.yaml: ad_account_id · countries · prefix · excluded CAs.
# ─────────────────────────────────────────────────────────────────────────────

meta:
  ad_account_id: "act_1024930575770087"    # Martin SG ad account (SG-specific)
  page_id: "341825319024143"               # shared with MY
  instagram_user_id: null                  # IG via the Page's linked IG (same as main)
  pixel_id: "1189593242351293"             # shared with MY (must be shared to the SG ad account)

  objective: "OUTCOME_SALES"
  optimization_goal: "OFFSITE_CONVERSIONS"
  conversion_event: "COMPLETE_REGISTRATION"
  special_ad_categories: []
  regional_regulated_categories: ["SINGAPORE_UNIVERSAL"]   # SG requires this on the campaign

  lead_destination:
    type: "WEBSITE"
    link_url: "https://as.dr-martin.com.tw/kids-growth-formula-landing"
  conversion_domain: "https://as.dr-martin.com.tw/"
  call_to_action: "LEARN_MORE"
  url_tags: "utm_source={{adset.name}}&utm_medium={{placement}}&utm_campaign={{campaign.name}}&utm_content={{ad.name}}"

  budget:
    level: "CAMPAIGN"
    daily_amount_myr: 50                   # small-budget test (operator: 50-100/day)
    currency: "MYR"
    adset_min_spend_myr: 50

  targeting:                               # identical broad setup to the main config (see docs/adset_targeting.md)
    countries: ["SG"]                      # SG-specific (was ["MY"])
    age_min: 25
    age_max: 65
    advantage_audience: 1
    locales: [1004]
    excluded_custom_audiences:             # SG-native (act_1024930575770087) — no cross-account sharing needed
      - "120226672882380093"               # "15 days complete registration" (SG website/pixel CA)
      - "120246547080720093"               # "马丁 1997 Paid Student" (SG customer list)

  build:
    creatives_per_adset: 10
    activate_after_build: false            # build PAUSED; activate after review
    label: "成绩单"                         # campaign name -> "MARTIN-SG | 成绩单"
    state_key: "entities_grades"           # separate state file so it never touches the main campaign

naming:
  prefix: "MARTIN-SG"                      # SG-specific
  weekly_off_label: "ADBOT_WEEKLY_OFF"

drive:
  # "成绩单" content folder (2 single images + CAROUSEL 1 + CAROUSEL 2), reused from MY. Must be
  # readable by the build service account (the SA in GOOGLE_SERVICE_ACCOUNT_JSON).
  creatives_folder_id: "13Ojdyka9Dy1wQZcvZ87xyb_KnpvT-M32"
  carousel_subfolder_marker: "carousel"     # matches "CAROUSEL 1" / "CAROUSEL 2"
  script_sidecar_ext: ".txt"

google_docs:
  caption_log_doc_id: ""
  idea_backlog_doc_id: ""

notion:                                    # same Notion DB; captions matched by Content ID
  enabled: true
  database_id: "4bb82b42449682c294e881448aa21435"
  brand: "Martin MY"
  default_status: "In Review"
  default_type: "Caption"
  captions_source: true
  require_status: ""

kpi:
  cpl_threshold_myr: 55.00
  cpl_min_spend_myr: 100.00
  cpl_lookback: "week_thu"
  pause_zero_lead_after_spend: true
  cpl_hold: []

cpa:
  enabled: true
  spreadsheet_id: "1DsKtcDpsWp3Njfah6Fw3PBizhGiy017ULw5qKeV-RSA"
  sales_tab: "Paid Student List (RM1997)"
  price_myr: 2591.00
  target_myr: 740.00
  healthy_max_myr: 860.00
  max_acceptable_myr: 1040.00
  hard_stop_myr: 1300.00
  conversion_days: 14
  min_spend_myr: 1000.00

schedule:
  timezone: "Asia/Singapore"
  weekly_off: { day: "WED", time: "15:00" }
  weekly_on:  { day: "THU", time: "00:00" }
  monitor_interval_hours: 1
