#  ─────────────────────────────────────────────────────────────────────────────
#  adbot — batch config: "Remarketing" (SG retargeting campaign, 100 MYR/day CBO) — martin-ads-SG
#  1 campaign + 3 ad sets targeting warm audiences:
#    · Video Viewers 25%+ (30d)
#    · LP Visitors (30d)
#    · Registered No-Shows
#  Built via scripts/build_remarketing.py — a custom script (bypasses build_1_1_10's
#  1-adset assumption) that creates the campaign + 3 empty adsets PAUSED with all SG
#  compliance. Custom audiences are attached manually in Ads Manager: each adset gets
#  the matching CA as an INCLUDED custom_audience (adbot doesn't yet write included
#  CAs from config), and the winning ads are added via "Use Existing Post".
#  ─────────────────────────────────────────────────────────────────────────────

meta:
  ad_account_id: "act_1024930575770087"
  page_id: "341825319024143"
  instagram_user_id: null
  pixel_id: "1189593242351293"

  objective: "OUTCOME_SALES"
  optimization_goal: "OFFSITE_CONVERSIONS"
  conversion_event: "COMPLETE_REGISTRATION"
  special_ad_categories: []
  regional_regulated_categories: ["SINGAPORE_UNIVERSAL"]

  lead_destination:
    type: "WEBSITE"
    link_url: "https://as.dr-martin.com.tw/kids-growth-formula-landing"
  conversion_domain: "https://as.dr-martin.com.tw/"
  call_to_action: "LEARN_MORE"
  url_tags: "utm_source={{adset.name}}&utm_medium={{placement}}&utm_campaign={{campaign.name}}&utm_content={{ad.name}}"

  budget:
    level: "CAMPAIGN"                      # CBO — Meta splits the 100 MYR/day across the 3 ad sets
    daily_amount_myr: 100
    currency: "MYR"
    adset_min_spend_myr: 20                # small floor so Meta can spread thin across 3 adsets

  regional_regulation_identities:
    singapore_universal_beneficiary: "1480351249808277"
    singapore_universal_payer: "1480351249808277"

  targeting:
    countries: ["SG"]
    age_min: 25
    age_max: 65
    advantage_audience: 0                  # warm audiences — turn Advantage+ OFF so Meta doesn't expand beyond the CA
    locales: [1004]
    excluded_custom_audiences:
      - "120246547080720093"               # 马丁 1997 Paid Student — never re-market to buyers

  build:
    creatives_per_adset: 0                 # ADS ADDED MANUALLY IN ADS MANAGER
    activate_after_build: false
    label: "Remarketing"                   # campaign name -> "MARTIN-SG | Remarketing"
    state_key: "entities_remarketing"

# Custom section read by scripts/build_remarketing.py — the 3 warm-audience ad sets.
# The included_custom_audience_id is left empty; the operator attaches the matching CA in
# Ads Manager after the shell is built (adbot's Targeting model doesn't yet support include CAs).
remarketing:
  adsets:
    - name: "Video Viewers 25% (30d)"
      included_custom_audience_id: ""      # SG CA — video 25%-viewed 30d
    - name: "LP Visitors (30d)"
      included_custom_audience_id: ""      # SG CA — LP visitors 30d
    - name: "Registered No-Shows"
      included_custom_audience_id: ""      # SG CA — registered but not attended

naming:
  prefix: "MARTIN-SG"
  weekly_off_label: "ADBOT_WEEKLY_OFF"

drive:
  creatives_folder_id: "1XTztY2xvAKY0YfZW3spZi3ZEKqu3lHlF"   # placeholder — script skips Drive
  carousel_subfolder_marker: "carousel"
  script_sidecar_ext: ".txt"

google_docs:
  caption_log_doc_id: ""
  idea_backlog_doc_id: ""

notion:
  enabled: true
  database_id: "4bb82b42449682c294e881448aa21435"
  brand: "Martin MY"
  default_status: "In Review"
  default_type: "Caption"
  captions_source: true
  require_status: ""

kpi:
  cpl_threshold_myr: 65.00                 # match config.yaml (65 for SG market)
  cpl_min_spend_myr: 100.00
  cpl_lookback: "week_thu"
  pause_zero_lead_after_spend: true
  cpl_hold: []

cpa:
  enabled: true
  spreadsheet_id: "1DsKtcDpsWp3Njfah6Fw3PBizhGiy017ULw5qKeV-RSA"
  sales_tab: "Paid Student List (RM1997)"
  price_myr: 2591.00
  target_myr: 740.00
  healthy_max_myr: 860.00
  max_acceptable_myr: 1040.00
  hard_stop_myr: 1300.00
  conversion_days: 14
  min_spend_myr: 1000.00

schedule:
  timezone: "Asia/Singapore"
  weekly_off: { day: "WED", time: "15:00" }
  weekly_on:  { day: "THU", time: "00:00" }
  monitor_interval_hours: 1
