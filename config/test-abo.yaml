#  operator/monitor; this config just creates the container). Structure is built via
#  scripts/build_test_abo.py which calls build_1_1_10.build() with units=[] — campaign +
#  ad set created PAUSED, new test creatives added manually in Ads Manager.
#  ─────────────────────────────────────────────────────────────────────────────

