    age_max: 65
    advantage_audience: 1
    locales: [1004]
    excluded_custom_audiences:
      - "120226672882380093"
      - "120246547080720093"

  build:
    creatives_per_adset: 4                 # 4 holistic-change single images
    activate_after_build: false
    label: "单图-改变"                       # campaign name -> "MARTIN-SG | 单图-改变"
    state_key: "entities_singleimg_d"      # separate state file — never touches other batches

