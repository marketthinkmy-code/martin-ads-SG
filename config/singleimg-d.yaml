  instagram_user_id: null
  pixel_id: "1189593242351293"

  objective: "OUTCOME_SALES"
  optimization_goal: "OFFSITE_CONVERSIONS"
  conversion_event: "COMPLETE_REGISTRATION"
  special_ad_categories: []
